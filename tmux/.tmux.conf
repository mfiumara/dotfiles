set-option -g history-limit 100000

# Use backtick as the primary prefix, while keeping the default Ctrl-b as a fallback.
set -g prefix `
set -g prefix2 C-b
bind ` send-prefix
bind C-b send-prefix

# Vim-style pane navigation.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Ergonomic splits and pane zoom.
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind q resize-pane -Z
bind Q display-panes

# Rotate all panes forward.
bind r rotate-window

# Cycle through preset pane layouts.
bind t next-layout

# Session/window picker (default `s` is taken by split).
bind S choose-tree -s

# Toggle to last window (default `l` is taken by pane nav).
bind Tab last-window


# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'odedlaz/tmux-onedark-theme'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
